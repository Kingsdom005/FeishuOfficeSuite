syntax = "proto3";

package api.feishu.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/feishu/feishu-office-suite/api/feishu/v1;v1";

service FeishuCalendar {
  rpc GetCalendar(GetCalendarRequest) returns (GetCalendarResponse);
  rpc ListCalendars(ListCalendarsRequest) returns (ListCalendarsResponse);
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc UpdateEvent(UpdateEventRequest) returns (UpdateEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (google.protobuf.Empty);
}

message Calendar {
  string calendar_id = 1;
  string summary = 2;
  string description = 3;
  string type = 4;
  string timezone = 5;
  bool is_primary = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Event {
  string event_id = 1;
  string calendar_id = 2;
  string summary = 3;
  string description = 4;
  bool is_all_day = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  string timezone = 8;
  repeated Attendee attendees = 9;
  string status = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message Attendee {
  string user_id = 1;
  string user_name = 2;
  string email = 3;
  string status = 4;
  bool is_organizer = 5;
}

message GetCalendarRequest {
  string calendar_id = 1;
}

message GetCalendarResponse {
  Calendar calendar = 1;
}

message ListCalendarsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListCalendarsResponse {
  repeated Calendar calendars = 1;
  bool has_more = 2;
  string next_page_token = 3;
}

message CreateEventRequest {
  string calendar_id = 1;
  string summary = 2;
  string description = 3;
  bool is_all_day = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  string timezone = 7;
  repeated string attendee_emails = 8;
}

message CreateEventResponse {
  Event event = 1;
}

message GetEventRequest {
  string calendar_id = 1;
  string event_id = 2;
}

message GetEventResponse {
  Event event = 1;
}

message ListEventsRequest {
  string calendar_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  google.protobuf.Timestamp start_time = 4;
  google.protobuf.Timestamp end_time = 5;
}

message ListEventsResponse {
  repeated Event events = 1;
  bool has_more = 2;
  string next_page_token = 3;
}

message UpdateEventRequest {
  string calendar_id = 1;
  string event_id = 2;
  string summary = 3;
  string description = 4;
  bool is_all_day = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  string timezone = 8;
}

message DeleteEventRequest {
  string calendar_id = 1;
  string event_id = 2;
}

service FeishuApproval {
  rpc GetApproval(GetApprovalRequest) returns (GetApprovalResponse);
  rpc ListApprovals(ListApprovalsRequest) returns (ListApprovalsResponse);
  rpc CreateApproval(CreateApprovalRequest) returns (CreateApprovalResponse);
  rpc GetApprovalInstance(GetApprovalInstanceRequest) returns (GetApprovalInstanceResponse);
  rpc ListApprovalInstances(ListApprovalInstancesRequest) returns (ListApprovalInstancesResponse);
  rpc ApproveInstance(ApproveInstanceRequest) returns (google.protobuf.Empty);
  rpc RejectInstance(RejectInstanceRequest) returns (google.protobuf.Empty);
}

message Approval {
  string approval_id = 1;
  string name = 2;
  string description = 3;
  string form_content = 4;
  int32 instance_count = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message ApprovalInstance {
  string instance_id = 1;
  string approval_id = 2;
  string title = 3;
  string status = 4;
  string initiator_id = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
}

message GetApprovalRequest {
  string approval_id = 1;
}

message GetApprovalResponse {
  Approval approval = 1;
}

message ListApprovalsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListApprovalsResponse {
  repeated Approval approvals = 1;
  bool has_more = 2;
  string next_page_token = 3;
}

message CreateApprovalRequest {
  string name = 1;
  string description = 2;
  string form_content = 3;
  repeated string approver_ids = 4;
}

message CreateApprovalResponse {
  Approval approval = 1;
}

message GetApprovalInstanceRequest {
  string instance_id = 1;
}

message GetApprovalInstanceResponse {
  ApprovalInstance instance = 1;
}

message ListApprovalInstancesRequest {
  string approval_id = 1;
  int32 page_size = 2;
  string page_token = 3;
  string status = 4;
}

message ListApprovalInstancesResponse {
  repeated ApprovalInstance instances = 1;
  bool has_more = 2;
  string next_page_token = 3;
}

message ApproveInstanceRequest {
  string instance_id = 1;
  string comment = 2;
}

message RejectInstanceRequest {
  string instance_id = 1;
  string comment = 2;
}